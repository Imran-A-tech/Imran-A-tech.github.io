<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Beans Web - Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* High-Budget Hero Overrides */
        .content {
            background: radial-gradient(circle at center, #0a192f 0%, #000 100%);
            justify-content: center; /* Centers the hero vertically */
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(74, 144, 226, 0.2);
            border-radius: 24px;
            padding: 60px;
            max-width: 1000px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .hero-images { 
            display: flex; 
            gap: 25px; 
            justify-content: center; 
            margin-bottom: 40px; 
            flex-wrap: wrap; 
        }

        .hero-img { 
            width: 380px; 
            height: 220px; 
            object-fit: cover; 
            border-radius: 15px; 
            border: 2px solid rgba(74, 144, 226, 0.3);
            box-shadow: 0 0 20px rgba(26, 74, 142, 0.4);
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .hero-img:hover {
            transform: scale(1.03);
            border-color: #4a90e2;
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.6);
        }

        .main-title {
            font-size: 3.5em;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #4a90e2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            line-height: 1.1;
        }

        /* Large Action Button */
        .btn-hero {
            padding: 20px 50px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #1a4a8e 0%, #4a90e2 100%);
            border: none;
            box-shadow: 0 10px 20px rgba(26, 74, 142, 0.3);
            border-radius: 50px; /* Rounded pill shape */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-hero:hover {
            box-shadow: 0 0 30px rgba(74, 144, 226, 0.5);
            transform: translateY(-3px) scale(1.05);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2.2em; }
            .hero-img { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="logo-text">Hot Beans Web</div>
                <img src="Black Coffee Beans Circle Sticker (1).png" alt="Logo" class="logo-img">
            </div>
            <nav class="nav-bar">
                <a href="index.html">Home</a>
                <a href="reviews.html">Reviews</a>
                <a href="listings.html">Listings</a>
                <a href="courses.html">Courses</a>
            </nav>
        </header>

        <div class="content">
            <div class="hero-card">
                <div class="hero-images">
                    <img src="index1.png" alt="Developer at workstation" class="hero-img">
                    <img src="index2.png" alt="Developer coding" class="hero-img">
                </div>
                
                <h1 class="main-title">Employing the next generation of developers.</h1>
                <p style="font-size: 1.2em; color: #aaa; margin-bottom: 40px; max-width: 700px; margin-left: auto; margin-right: auto;">
                    We bridge the gap between newly-trained talent and industry-leading projects. 
                    Your career in tech starts here.
                </p>
                
                <a href="listings.html" class="btn btn-hero">Explore Opportunities</a>
            </div>
        </div>
    </div>

</body>
</html>
