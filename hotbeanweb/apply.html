<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply - Hot Beans Web</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* [Existing styles kept for brevity...] */
        .content {
            background: radial-gradient(circle at center, #0a192f 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(74, 144, 226, 0.2);
            border-radius: 24px;
            padding: 50px;
            max-width: 900px;
            width: 95%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h3 {
            font-size: 2.2em;
            background: linear-gradient(to right, #ffffff, #4a90e2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 800;
        }

        /* STYLED UPLOAD AREA */
        .upload-container {
            margin-bottom: 30px;
        }

        /* We hide the actual input */
        #file-upload {
            display: none;
        }

        /* We style the label to look like your button */
        .custom-file-upload {
            display: inline-block;
            padding: 12px 25px;
            border: 1px dashed rgba(74, 144, 226, 0.5);
            border-radius: 12px;
            color: #4a90e2;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            background: rgba(74, 144, 226, 0.05);
        }

        .custom-file-upload:hover {
            background: rgba(74, 144, 226, 0.15);
            border-color: #4a90e2;
            color: white;
            transform: translateY(-2px);
        }

        .file-name {
            display: block;
            margin-top: 8px;
            font-size: 0.8em;
            color: #aaa;
            font-style: italic;
        }

        /* [Rest of the existing input and button styles...] */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(74, 144, 226, 0.3); color: white; padding: 15px; border-radius: 12px; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: #4a90e2; box-shadow: 0 0 15px rgba(74, 144, 226, 0.3); }
        .apply-btn { margin-top: 40px; padding: 18px 60px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(135deg, #1a4a8e 0%, #4a90e2 100%); border: none; color: white; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; }
        .apply-btn:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(74, 144, 226, 0.5); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="logo-text">Hot Beans Web</div>
                <img src="Black Coffee Beans Circle Sticker (1).png" alt="Logo" class="logo-img">
            </div>
            <nav class="nav-bar">
                <a href="index.html">Home</a>
                <a href="reviews.html">Reviews</a>
                <a href="listings.html">Listings</a>
                <a href="courses.html">Courses</a>
            </nav>
        </header>
    
        <div class="content">
            <div class="form-card">
                <h3>Start Your Journey</h3>
                <p style="color: #aaa; margin-bottom: 20px;">Applying for: <span style="color: #4a90e2; font-weight: bold;">Full Stack Developer</span></p>
                
                <div class="upload-container">
                    <label for="file-upload" class="custom-file-upload">
                        📎 Click to Attach CV / Portfolio (PDF)
                    </label>
                    <input id="file-upload" type="file" accept=".pdf,.doc,.docx" onchange="displayFileName()">
                    <span id="file-chosen" class="file-name">No file selected</span>
                </div>
                
                <form action="courses.html">
                    <div class="form-grid">
                        <input type="text" placeholder="FIRST NAME" required>
                        <input type="text" placeholder="MOBILE PHONE NUMBER" required>
                        <input type="text" placeholder="LAST NAME" required>
                        <input type="email" placeholder="EMAIL ADDRESS" required>
                        <input type="text" placeholder="STREET ADDRESS">
                        <input type="text" placeholder="POSTCODE">
                        <input type="text" placeholder="EDUCATIONAL BACKGROUND">
                        <input type="text" placeholder="QUALIFICATIONS">
                    </div>
                    <button type="submit" class="apply-btn">Submit Application and Head To Courses</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function displayFileName() {
            const fileInput = document.getElementById('file-upload');
            const fileChosen = document.getElementById('file-chosen');
            if (fileInput.files.length > 0) {
                fileChosen.textContent = "Selected: " + fileInput.files[0].name;
                fileChosen.style.color = "#4a90e2";
            }
        }
    </script>

</body>
</html>
